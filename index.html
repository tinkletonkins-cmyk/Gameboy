<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Game Boy</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      background: #12121f;
      background-image: radial-gradient(ellipse at 30% 40%, rgba(30, 10, 60, .7) 0%, transparent 55%), radial-gradient(ellipse at 75% 70%, rgba(10, 30, 50, .5) 0%, transparent 50%);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-family: 'Press Start 2P', monospace;
      padding: 40px 20px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .gameboy {
      width: 400px;
      background: var(--gb-color, #d0d0dc);
      border-radius: 20px 20px 84px 20px;
      padding: 26px 26px 60px;
      box-shadow: 4px 4px 0 transparent, 9px 9px 0 transparent, 0 28px 76px rgba(0, 0, 0, .8), inset 0 2px 0 rgba(255, 255, 255, .85), inset -3px -3px 10px rgba(0, 0, 0, .12);
      position: relative;
      transition: background .3s, box-shadow .3s;
    }

    .screen-bezel {
      background: #1e1e2e;
      border-radius: 11px 11px 5px 5px;
      padding: 15px 15px 20px;
      box-shadow: inset 0 4px 11px rgba(0, 0, 0, .7), inset 0 0 0 2px #14141e;
      margin-bottom: 18px;
      position: relative;
    }

    .screen-bezel::after {
      content: '● ●';
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 6px;
      color: #44445a;
      letter-spacing: 5px;
    }

    .screen-label {
      text-align: center;
      font-size: 6px;
      color: #55556a;
      letter-spacing: 2px;
      margin-bottom: 9px;
    }

    #gameCanvas {
      display: block;
      width: 320px;
      height: 288px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      margin: 0 auto;
      border: 2px solid #0a0a12;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 5px;
    }

    .dpad {
      width: 85px;
      height: 85px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 2px;
    }

    .dpad-btn {
      background: #4a4a5a;
      border-radius: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #6a6a7a;
      user-select: none;
      box-shadow: 0 2px 0 #2a2a3a;
      transition: transform .05s, box-shadow .05s;
    }

    .dpad-btn:active,
    .dpad-btn.pressed {
      transform: translateY(1px);
      box-shadow: 0 1px 0 #2a2a3a;
      background: #3a3a4a;
    }

    .dpad-center {
      background: #3a3a4a;
      cursor: default;
    }

    .dpad-empty {
      background: transparent;
      box-shadow: none;
      cursor: default;
    }

    .ab-buttons {
      display: flex;
      gap: 9px;
      align-items: flex-end;
      margin-bottom: 5px;
    }

    .btn-circle {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: rgba(255, 255, 255, .92);
      cursor: pointer;
      box-shadow: 0 3px 0 rgba(0, 0, 0, .45);
      user-select: none;
      transition: transform .05s, box-shadow .05s;
    }

    .btn-circle:active,
    .btn-circle.pressed {
      transform: translateY(2px);
      box-shadow: 0 1px 0 rgba(0, 0, 0, .45);
      filter: brightness(1.3);
    }

    .btn-a {
      background: #cc2244;
    }

    .btn-b {
      background: #882266;
    }

    .start-select {
      display: flex;
      gap: 11px;
      justify-content: center;
      margin-top: 12px;
    }

    .btn-small {
      background: #888898;
      border-radius: 9px;
      width: 42px;
      height: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4px;
      color: #3a3a4a;
      cursor: pointer;
      box-shadow: 0 2px 0 #5a5a6a;
      letter-spacing: 1px;
      user-select: none;
    }

    .btn-small:active,
    .btn-small.pressed {
      transform: translateY(1px);
      box-shadow: 0 1px 0 #5a5a6a;
      filter: brightness(1.2);
    }

    .speaker {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 5px;
      align-self: flex-end;
      margin-bottom: 7px;
    }

    .speaker-row {
      display: flex;
      gap: 4px;
    }

    .speaker-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #b0b0c0;
      box-shadow: inset 0 1px 0 rgba(0, 0, 0, .3);
    }

    .color-picker {
      display: flex;
      gap: 7px;
      align-items: center;
      justify-content: center;
    }

    .color-swatch {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid rgba(0, 0, 0, 0.3);
      transition: transform .15s, border .15s;
    }

    .color-swatch:hover {
      transform: scale(1.2);
    }

    .color-swatch.active {
      border: 3px solid #fff;
      transform: scale(1.15);
    }

    .color-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 4px;
      color: #555;
      letter-spacing: 1px;
    }

    /* Power button */
    .power-btn {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #cc2244;
      border: 2px solid #881122;
      cursor: pointer;
      position: absolute;
      right: 18px;
      top: 12px;
      box-shadow: 0 2px 0 #660011;
      transition: transform .1s;
    }

    .power-btn:active {
      transform: scale(0.9);
    }

    /* ── SKIN SYSTEM ── */
    .gameboy {
      position: relative;
    }

    .skin-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 22px 22px 90px 22px;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
      filter: contrast(1.1) saturate(1.4) sepia(0.06);
    }

    .skin-overlay svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .screen-bezel,
    .dpad-btn,
    .dpad-empty,
    .dpad-center,
    .btn-circle,
    .btn-small,
    .power-btn,
    .speaker,
    .ab-buttons {
      position: relative;
      z-index: 3;
    }

    .skin-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      padding: 12px 0;
    }

    .skin-panel-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 5px;
      color: #666;
      letter-spacing: 1px;
    }

    .skin-row {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 560px;
    }

    .skin-thumb {
      width: 56px;
      height: 72px;
      cursor: pointer;
      border: 2px solid #333;
      overflow: hidden;
      flex-shrink: 0;
      transition: border-color .12s, transform .12s;
      border-radius: 4px 4px 14px 4px;
    }

    .skin-thumb:hover {
      border-color: #aaa;
      transform: scale(1.07);
    }

    .skin-thumb.active-skin {
      border-color: #fff;
    }

    .skin-thumb svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── COLLAPSE TOGGLE ── */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 2px 0;
      width: 420px;
    }

    .toggle-row:hover .toggle-label {
      color: #aaa;
    }

    .toggle-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 5px;
      color: #444;
      letter-spacing: 1px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 3px 10px;
      white-space: nowrap;
      user-select: none;
    }

    .toggle-line {
      flex: 1;
      height: 1px;
      background: #1e1e2e;
    }

    .collapsible {
      overflow: hidden;
      transition: max-height .4s cubic-bezier(.4, 0, .2, 1), opacity .35s;
      max-height: 600px;
      opacity: 1;
    }

    .collapsible.collapsed {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
    }

    /* ── RESPONSIVE FOR SMALLER SCREENS ── */
    @media (max-height: 700px) {
      body {
        padding: 15px 20px;
        justify-content: flex-start;
        gap: 8px;
      }

      .collapsible {
        max-height: 300px;
      }
    }

    body.no-scroll {
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div class="gameboy" id="gameboy">
    <div class="skin-overlay" id="skinOverlay"></div>
    <div class="power-btn" id="powerBtn" title="Power Off/On"></div>
    <div class="screen-bezel">
      <div class="screen-label">Nintendo</div>
      <canvas id="gameCanvas" width="320" height="288"></canvas>
    </div>
    <div class="start-select">
      <div class="btn-small" id="btn-select">SELECT</div>
      <div class="btn-small" id="btn-start">START</div>
    </div>
    <div class="controls">
      <div class="dpad">
        <div class="dpad-empty"></div>
        <div class="dpad-btn" id="btn-up">▲</div>
        <div class="dpad-empty"></div>
        <div class="dpad-btn" id="btn-left">◀</div>
        <div class="dpad-btn dpad-center"></div>
        <div class="dpad-btn" id="btn-right">▶</div>
        <div class="dpad-empty"></div>
        <div class="dpad-btn" id="btn-down">▼</div>
        <div class="dpad-empty"></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="ab-buttons">
          <div class="btn-circle btn-b" id="btn-b">B</div>
          <div class="btn-circle btn-a" id="btn-a">A</div>
        </div>
        <div style="font-size:6px;color:#888898;letter-spacing:2px">B &nbsp;&nbsp; A</div>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:6px">
      <div class="speaker">
        <div class="speaker-row">
          <div class="speaker-dot"></div>
          <div class="speaker-dot"></div>
          <div class="speaker-dot"></div>
          <div class="speaker-dot"></div>
          <div class="speaker-dot"></div>
        </div>
        <div class="speaker-row">
          <div class="speaker-dot"></div>
          <div class="speaker-dot"></div>
          <div class="speaker-dot"></div>
          <div class="speaker-dot"></div>
          <div class="speaker-dot"></div>
        </div>
        <div class="speaker-row">
          <div class="speaker-dot"></div>
          <div class="speaker-dot"></div>
          <div class="speaker-dot"></div>
          <div class="speaker-dot"></div>
          <div class="speaker-dot"></div>
        </div>
        <div class="speaker-row">
          <div class="speaker-dot"></div>
          <div class="speaker-dot"></div>
          <div class="speaker-dot"></div>
          <div class="speaker-dot"></div>
          <div class="speaker-dot"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toggle-row" onclick="togglePanels()" id="toggleRow">
    <div class="toggle-line"></div>
    <span class="toggle-label" id="toggleLabel">▲ HIDE</span>
    <div class="toggle-line"></div>
  </div>

  <div class="collapsible" id="colPanels">
    <div class="color-picker">
      <span class="color-label">COLOR:</span>
      <div class="color-swatch active" style="background:#d0d0dc;" onclick="setGBColor('#d0d0dc','#a0a0b0',this)"
        title="Classic Grey"></div>
      <div class="color-swatch" style="background:#e8c8f0;" onclick="setGBColor('#e8c8f0','#c090d0',this)"
        title="Purple"></div>
      <div class="color-swatch" style="background:#c8e0f8;" onclick="setGBColor('#c8e0f8','#90b8e0',this)" title="Blue">
      </div>
      <div class="color-swatch" style="background:#c8f0d0;" onclick="setGBColor('#c8f0d0','#90d0a0',this)"
        title="Green"></div>
      <div class="color-swatch" style="background:#f8d0c8;" onclick="setGBColor('#f8d0c8','#e0a090',this)" title="Red">
      </div>
      <div class="color-swatch" style="background:#f8f0c0;" onclick="setGBColor('#f8f0c0','#e0d080',this)"
        title="Yellow"></div>
      <div class="color-swatch" style="background:#1a1a1a;border-color:#555;"
        onclick="setGBColor('#1a1a1a','#000',this)" title="Black"></div>
      <div class="color-swatch" style="background:#ff6b9d;" onclick="setGBColor('#ff6b9d','#c44569',this)" title="Pink">
      </div>
      <div class="color-swatch" style="background:#f8b500;" onclick="setGBColor('#f8b500','#d4940e',this)"
        title="Orange"></div>
      <div class="color-swatch" style="background:#38ada9;" onclick="setGBColor('#38ada9','#2c8a85',this)" title="Teal">
      </div>
      <div class="color-swatch" style="background:#786fa6;" onclick="setGBColor('#786fa6','#5f4b8b',this)"
        title="Lavender"></div>
      <div class="color-swatch" style="background:#00ff88;" onclick="setGBColor('#00ff88','#00cc6a',this)"
        title="Neon Green"></div>
      <div class="color-swatch" style="background:#ff00ff;" onclick="setGBColor('#ff00ff','#cc00cc',this)"
        title="Neon Pink"></div>
      <div class="color-swatch" style="background:#ffffff;border-color:#ccc;"
        onclick="setGBColor('#ffffff','#e0e0e0',this)" title="White"></div>
      <div id="muteBtn" class="color-swatch"
        style="background:#333;border-color:#555;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;"
        onclick="soundEnabled=!soundEnabled;this.textContent=soundEnabled?'🔊':'🔇';" title="Toggle Sound">🔊</div>
    </div>

    <!-- SKIN PANEL -->
    <div class="skin-panel">
      <span class="skin-panel-label">✦ BODY SKINS — click to apply ✦</span>
      <div class="skin-row" id="skinTray"></div>
    </div>
  </div><!-- /colPanels -->
  <script>
    // ── Toggle panels ──
    let _panelsOpen = true;
    function togglePanels() {
      _panelsOpen = !_panelsOpen;
      document.getElementById('colPanels').classList.toggle('collapsed', !_panelsOpen);
      document.getElementById('toggleLabel').textContent = _panelsOpen ? '▲ HIDE' : '▼ SHOW';
      document.getElementById('toggleRow').style.display = _panelsOpen ? 'flex' : 'none';
      document.body.classList.toggle('no-scroll', !_panelsOpen);
    }

    // ═══ CORE ═══
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.scale(2, 2);

    // Make all text render crisp and sharp at double resolution seamlessly
    const origFillText = ctx.fillText.bind(ctx);
    ctx.fillText = function (txt, x, y, maxWidth) {
      const match = this.font.match(/(\d+\.?\d*)px/);
      if (match) {
        const size = parseFloat(match[1]);
        this.save();
        this.scale(0.5, 0.5);
        this.font = this.font.replace(match[0], `${size * 2}px`);
        if (maxWidth !== undefined) origFillText(txt, Math.floor(x * 2), Math.floor(y * 2), Math.floor(maxWidth * 2));
        else origFillText(txt, Math.floor(x * 2), Math.floor(y * 2));
        this.restore();
      } else {
        origFillText(txt, x, y);
      }
    };
    const P = { w: '#e8f8d0', l: '#a0c858', m: '#386828', d: '#082000' };

    function setGBColor(bg, shadow, el) {
      document.getElementById('gameboy').style.setProperty('--gb-color', bg);
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('gameboy').style.boxShadow = `5px 5px 0 ${shadow},10px 10px 0 ${shadow},0 30px 80px rgba(0,0,0,.8),inset 0 2px 0 rgba(255,255,255,.85),inset -3px -3px 10px rgba(0,0,0,.12)`;
      // Clear skin overlay when using color picker
      document.getElementById('skinOverlay').innerHTML = '';
      document.querySelectorAll('.skin-thumb').forEach(el => el.classList.remove('active-skin'));
    }

    // ── Power on/off ──
    let powered = true, powerAnim = 0, poweringOff = false, poweringOn = false;
    document.getElementById('powerBtn').addEventListener('click', () => {
      if (powered && !poweringOff) { poweringOff = true; powerAnim = 0; }
      else if (!powered && !poweringOn) { poweringOn = true; powerAnim = 0; }
    });

    // INPUT
    const keys = {}, jp = {};
    // Key → button id mapping for visual feedback
    const keyToBtnId = { 'ArrowUp': 'btn-up', 'ArrowDown': 'btn-down', 'ArrowLeft': 'btn-left', 'ArrowRight': 'btn-right', 'a': 'btn-a', 'b': 'btn-b', 'Enter': 'btn-start', 'Shift': 'btn-select' };
    document.addEventListener('keydown', e => {
      if (!keys[e.key]) jp[e.key] = true;
      keys[e.key] = true;
      // visually press the gameboy button
      const btnId = keyToBtnId[e.key];
      if (btnId) { const el = document.getElementById(btnId); if (el) el.classList.add('pressed'); }
      e.preventDefault();
    });
    document.addEventListener('keyup', e => {
      keys[e.key] = false;
      const btnId = keyToBtnId[e.key];
      if (btnId) { const el = document.getElementById(btnId); if (el) el.classList.remove('pressed'); }
    });
    function pop(k) { const v = jp[k]; jp[k] = false; return v; }
    const btnMap = { 'btn-up': 'ArrowUp', 'btn-down': 'ArrowDown', 'btn-left': 'ArrowLeft', 'btn-right': 'ArrowRight', 'btn-a': 'a', 'btn-b': 'b', 'btn-start': 'Enter', 'btn-select': 'Shift' };
    Object.entries(btnMap).forEach(([id, key]) => {
      const el = document.getElementById(id); if (!el) return;
      const dn = () => { if (!keys[key]) jp[key] = true; keys[key] = true; el.classList.add('pressed'); };
      const up = () => { keys[key] = false; el.classList.remove('pressed'); };
      el.addEventListener('mousedown', dn); el.addEventListener('mouseup', up); el.addEventListener('mouseleave', up);
      el.addEventListener('touchstart', e => { e.preventDefault(); dn(); }, { passive: false });
      el.addEventListener('touchend', e => { e.preventDefault(); up(); });
    });

    function fr(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x, y, w, h); }
    function gt(s, x, y, c, sz) { ctx.save(); ctx.fillStyle = c || P.d; ctx.font = `${sz || 6}px 'Press Start 2P',monospace`; ctx.fillText(s, x, y); ctx.restore(); }
    function ct(s, y, c, sz) { ctx.save(); ctx.fillStyle = c || P.d; ctx.font = `${sz || 6}px 'Press Start 2P',monospace`; const w = ctx.measureText(s).width; ctx.fillText(s, Math.floor((160 - w) / 2), y); ctx.restore(); }
    function scanlines() { for (let y = 0; y < 144; y += 2) { ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0, y, 160, 1); } }
    function hpBar(x, y, w, cur, max) { fr(x, y, w, 4, P.d); const p = Math.max(0, cur / max); fr(x + 1, y + 1, Math.floor((w - 2) * p), 2, p > .5 ? P.m : p > .25 ? '#d0c000' : '#c02020'); }
    function cfm() { return pop('a') || pop('Enter'); }
    let screen = 'poweron', tick = 0, paused = false;
    let settings = { pongMode: 'cpu' };

    // ═══ SOUND ENGINE (Web Audio API) ═══
    let audioCtx = null, soundEnabled = true;
    function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
    document.addEventListener('click', ensureAudio, { once: true });
    document.addEventListener('keydown', ensureAudio, { once: true });

    function sfxTone(freq, dur, type, vol) {
      if (!soundEnabled || !audioCtx) return;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type || 'square'; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
      g.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (dur || 0.1));
      o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + (dur || 0.1) + 0.01);
    }
    function sfxEat() { sfxTone(880, 0.06, 'square', 0.06); sfxTone(1200, 0.04, 'square', 0.04); }
    function sfxDie() { const t = audioCtx?.currentTime || 0; if (!soundEnabled || !audioCtx) return; const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'square'; o.frequency.setValueAtTime(400, t); o.frequency.linearRampToValueAtTime(100, t + 0.4); g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.5); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(t + 0.5); }
    function sfxJump() { if (!soundEnabled || !audioCtx) return; const t = audioCtx.currentTime; const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'square'; o.frequency.setValueAtTime(300, t); o.frequency.linearRampToValueAtTime(600, t + 0.12); g.gain.setValueAtTime(0.07, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.15); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(t + 0.15); }

    function updatePokemon() {
      // Fade transition
      if (pk.mapTransition) {
        pk.fadeTick++;
        if (pk.fadeTick < 10) return; // fade out
        if (pk.fadeTick === 10) { pk.map = pk.transTo; pk.ox = pk.transSX; pk.oy = pk.transSY; pk.oface = 2; }
        if (pk.fadeTick < 20) return; // fade in
        pk.mapTransition = false; pk.fadeTick = 0; return;
      }
      // Party menu
      if (pk.partyMenu) {
        if (pop('b')) { pk.partyMenu = false; return; }
        if (pop('ArrowUp')) pk.partySel = Math.max(0, pk.partySel - 1);
        if (pop('ArrowDown')) pk.partySel = Math.min(pk.party.length - 1, pk.partySel + 1);
        return;
      }
      if (pop('Enter') && (pk.sub === 'overworld' || pk.sub === 'battle')) { paused = !paused; return; }
      if (paused) { if (cfm()) paused = false; else if (pop('b')) { paused = false; screen = 'launcher'; } return; }
      if (pk.sub === 'continue') {
        if (cfm()) { pk.sub = 'overworld'; return; }
        if (pop('b')) { try { localStorage.removeItem(PK_SAVE); } catch (e) { } Object.assign(pk, { sub: 'gamelist', party: [], caught: [] }); return; }
        return;
      }
      if (pk.sub === 'gamelist') { if (pop('b')) { screen = 'launcher'; return; } if (pop('ArrowUp')) { pgSel = Math.max(0, pgSel - 1); if (pgSel < pgScroll) pgScroll = pgSel; } if (pop('ArrowDown')) { pgSel = Math.min(POKE_GAMES.length - 1, pgSel + 1); if (pgSel >= pgScroll + PVS) pgScroll = pgSel - PVS + 1; } if (cfm()) pk.sub = 'starter'; return; }
      if (pk.sub === 'starter') {
        if (pop('b')) { pk.sub = 'gamelist'; return; }
        if (pop('ArrowLeft') || pop('ArrowUp')) pk.starterIdx = (pk.starterIdx - 1 + 3) % 3;
        if (pop('ArrowRight') || pop('ArrowDown')) pk.starterIdx = (pk.starterIdx + 1) % 3;
        if (cfm()) {
          pk.party = [pkMon(STARTERS[pk.starterIdx], 5)];
          pk.ox = 4; pk.oy = 4; pk.oface = 2; pk.omove = 0; pk.caught = []; pk.trainersBeaten = [];
          pk.bag = { potion: 5, superPotion: 2, pokeball: 10 }; pk.map = 'town';
          BMSGS = []; pk.sub = 'overworld';
        }
        return;
      }
      if (pk.sub === 'flash') { pk.flash--; if (pk.flash <= 0) { pk.sub = 'battle'; pk.bsub = 'msg'; } return; }
      if (pk.sub === 'overworld') {
        // NPC message
        if (pk.npcMsg) {
          if (cfm()) {
            pk.npcMsgIdx++;
            if (pk.npcMsgIdx >= pk.npcMsg.length) { pk.npcMsg = null; pk.npcMsgIdx = 0; }
          }
          return;
        }
        // Party menu via START
        if (pop('Enter') || pop('Shift')) { pk.partyMenu = true; pk.partySel = 0; return; }
        if (pk.omove > 0) { pk.omove--; return; }
        let dx = 0, dy = 0;
        if (keys['ArrowUp'] || keys['w']) { dy = -1; pk.oface = 0; }
        else if (keys['ArrowDown'] || keys['s']) { dy = 1; pk.oface = 2; }
        else if (keys['ArrowLeft']) { dx = -1; pk.oface = 3; }
        else if (keys['ArrowRight']) { dx = 1; pk.oface = 1; }
        // A button to interact with NPC in front

    function updatePong() {
      if (pop('Enter')) { paused = !paused; return; }
      if (paused) { if (cfm()) paused = false; else if (pop('b')) { paused = false; screen = 'launcher'; } return; }
      if (pg.over) { if (cfm()) initPong(); else if (pop('b')) screen = 'launcher'; return; }
      if (pg.serving) { if (cfm() || pop(' ')) { pg.serving = false; } return; }

      if (keys['s']) pg.p1y = Math.min(124, pg.p1y + 2.5);
      if (pg.mode === '2p') {
        if (keys['ArrowUp']) pg.p2y = Math.max(0, pg.p2y - 2.5);
        if (keys['ArrowDown']) pg.p2y = Math.min(124, pg.p2y + 2.5);
      } else {
        let aiTarget = pg.ball.y - 10;
        if (pg.ball.dx > 0) {
          const framesUntilArrival = Math.max(1, (148 - pg.ball.x) / Math.abs(pg.ball.dx));
          aiTarget = pg.ball.y + pg.ball.dy * framesUntilArrival * 0.2 - 10;
        }
        aiTarget = Math.max(0, Math.min(124, aiTarget));
        const aiDiff = aiTarget - pg.p2y;
        const aiMaxSpeed = 1.0;
        const aiReactionDelay = 0.3;
        if (Math.abs(aiDiff) > 2) {
          pg.p2y += Math.sign(aiDiff) * Math.min(aiMaxSpeed, Math.abs(aiDiff) * aiReactionDelay);
        }
        pg.p2y = Math.max(0, Math.min(124, pg.p2y));
      }
      pg.ball.x += pg.ball.dx; pg.ball.y += pg.ball.dy;
      if (pg.ball.y <= 5 || pg.ball.y >= 138) { pg.ball.dy *= -1; }
      if (pg.ball.x <= 10 && pg.ball.y >= pg.p1y && pg.ball.y <= pg.p1y + 20) {
        pg.ball.dx = Math.min(4, Math.abs(pg.ball.dx) + 0.1);
        pg.ball.dy = 3 * ((pg.ball.y - pg.p1y) / 20 - 0.5);
        pg.ball.x = 11; sfxBounce();

      if (pg.ball.x >= 148 && pg.ball.y >= pg.p2y && pg.ball.y <= pg.p2y + 20) {
        pg.ball.dx = -Math.min(4, Math.abs(pg.ball.dx) + 0.1);

      { id: 'tropical', label: 'TROPICAL', shellColor: '#1a6640', shellShadow: '#0d3320', svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 570" preserveAspectRatio="xMidYMid slice"><rect width="420" height="570" fill="#1a6640"/><ellipse cx="60" cy="60" rx="50" ry="25" fill="#22884a" transform="rotate(-20 60 60)"/><ellipse cx="60" cy="60" rx="50" ry="12" fill="#2aaa5a" transform="rotate(-20 60 60)"/><line x1="60" y1="60" x2="110" y2="130" stroke="#185530" stroke-width="4"/><ellipse cx="160" cy="30" rx="55" ry="22" fill="#22884a" transform="rotate(15 160 30)"/><ellipse cx="160" cy="30" rx="55" ry="10" fill="#2aaa5a" transform="rotate(15 160 30)"/><line x1="160" y1="30" x2="140" y2="110" stroke="#185530" stroke-width="4"/><ellipse cx="320" cy="80" rx="60" ry="24" fill="#22884a" transform="rotate(-10 320 80)"/><ellipse cx="320" cy="80" rx="60" ry="11" fill="#2aaa5a" transform="rotate(-10 320 80)"/><line x1="320" y1="80" x2="290" y2="160" stroke="#185530" stroke-width="4"/><ellipse cx="400" cy="40" rx="45" ry="20" fill="#22884a" transform="rotate(25 400 40)"/><line x1="400" y1="40" x2="370" y2="120" stroke="#185530" stroke-width="4"/><ellipse cx="30" cy="300" rx="55" ry="22" fill="#22884a" transform="rotate(-30 30 300)"/><line x1="30" y1="300" x2="80" y2="380" stroke="#185530" stroke-width="4"/><ellipse cx="390" cy="350" rx="58" ry="23" fill="#22884a" transform="rotate(20 390 350)"/><line x1="390" y1="350" x2="350" y2="430" stroke="#185530" stroke-width="4"/><ellipse cx="200" cy="480" rx="62" ry="25" fill="#22884a" transform="rotate(-15 200 480)"/><line x1="200" y1="480" x2="210" y2="570" stroke="#185530" stroke-width="4"/><circle cx="340" cy="260" r="30" fill="#ff6600"/><circle cx="340" cy="260" r="22" fill="#ff8800"/><circle cx="340" cy="260" r="14" fill="#ffaa00"/><circle cx="80" cy="450" r="22" fill="#ff4488"/><circle cx="80" cy="450" r="14" fill="#ff66aa"/><circle cx="370" cy="500" r="18" fill="#ff6600"/></svg>` },
    ];

    const skinOverlay = document.getElementById('skinOverlay');
    const skinTray = document.getElementById('skinTray');
    let activeSkinId = localStorage.getItem('gb_skin') || 'none';

    function applySkin(id) {
      activeSkinId = id;
      const skin = SKINS.find(s => s.id === id);
      skinOverlay.innerHTML = (skin && skin.svg) ? skin.svg : '';
      try { localStorage.setItem('gb_skin', id); } catch (e) { }
      document.querySelectorAll('.skin-thumb').forEach(el =>
        el.classList.toggle('active-skin', el.dataset.skinId === id));

      // ── Apply matching shell color ──
      const gb = document.getElementById('gameboy');
      const shellColor = (skin && skin.shellColor) ? skin.shellColor : '#d0d0dc';
      const shellShadow = (skin && skin.shellShadow) ? skin.shellShadow : '#a0a0b0';
      gb.style.setProperty('--gb-color', shellColor);
      gb.style.boxShadow = `4px 4px 0 ${shellShadow},9px 9px 0 ${shellShadow},0 28px 76px rgba(0,0,0,.8),inset 0 2px 0 rgba(255,255,255,.85),inset -3px -3px 10px rgba(0,0,0,.12)`;
      // Clear color swatch selection since skin overrides color
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    }

    SKINS.forEach(skin => {
      const thumb = document.createElement('div');
      thumb.className = 'skin-thumb';
      thumb.dataset.skinId = skin.id;
      thumb.title = skin.label;
      if (!skin.svg) {
        thumb.style.cssText = 'background:#1a1a2e;display:flex;align-items:center;justify-content:center;';
        thumb.innerHTML = `<span style="font-family:'Press Start 2P',monospace;font-size:5px;color:#888;text-align:center;line-height:1.8">NO<br>SKIN</span>`;
      } else {
        thumb.innerHTML = skin.svg;
      }
      thumb.addEventListener('click', () => applySkin(skin.id));
      skinTray.appendChild(thumb);
    });

    applySkin(activeSkinId);

    // ═══ ASTEROIDS ═══
    let as = {};
    function initAsteroids() {
      as = {
        ship: { x: 80, y: 72, angle: 0, vx: 0, vy: 0, thrust: false },
        asteroids: [],
        bullets: [],
        particles: [],
        score: 0,
        lives: 3,
        level: 1,
        gameOver: false,
        invulnerable: 0
      };
      for (let i = 0; i < 4; i++) {
        let x, y;
        do { x = Math.random() * 160; y = Math.random() * 144; } while (Math.hypot(x - 80, y - 72) < 30);
        as.asteroids.push({ x, y, vx: (Math.random() - 0.5) * 1, vy: (Math.random() - 0.5) * 1, size: 3, angle: 0, rotSpeed: (Math.random() - 0.5) * 0.05 });
      }
    }
    function updateAsteroids() {
      if (pop('Enter')) { paused = !paused; return; }
      if (paused) { if (cfm()) paused = false; else if (pop('b')) { paused = false; screen = 'launcher'; } return; }
      if (as.gameOver) { if (cfm()) { initAsteroids(); return; } if (pop('b')) { screen = 'launcher'; return; } }
      if (keys['ArrowLeft']) as.ship.angle -= 0.1;
      if (keys['ArrowRight']) as.ship.angle += 0.1;
      if (keys['ArrowUp']) { as.ship.thrust = true; as.ship.vx += Math.cos(as.ship.angle) * 0.3; as.ship.vy += Math.sin(as.ship.angle) * 0.3; } else { as.ship.thrust = false; }
      if (pop(' ')) { if (as.bullets.length < 4) { as.bullets.push({ x: as.ship.x + Math.cos(as.ship.angle) * 8, y: as.ship.y + Math.sin(as.ship.angle) * 8, vx: Math.cos(as.ship.angle) * 8, vy: Math.sin(as.ship.angle) * 8, life: 30 }); sfxShoot(); } }
      as.ship.x += as.ship.vx; as.ship.y += as.ship.vy; as.ship.vx *= 0.98; as.ship.vy *= 0.98;
      if (as.ship.x < 0) as.ship.x = 160; if (as.ship.x > 160) as.ship.x = 0;
      if (as.ship.y < 0) as.ship.y = 144; if (as.ship.y > 144) as.ship.y = 0;
      as.bullets = as.bullets.filter(b => { b.x += b.vx; b.y += b.vy; b.life--; if (b.x < 0 || b.x > 160 || b.y < 0 || b.y > 144 || b.life <= 0) return false; return true; });
      as.asteroids.forEach(a => { a.x += a.vx; a.y += a.vy; a.angle += a.rotSpeed; if (a.x < 0) a.x = 160; if (a.x > 160) a.x = 0; if (a.y < 0) a.y = 144; if (a.y > 144) a.y = 0; });
      as.particles = as.particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life--; return p.life > 0; });
      if (as.invulnerable <= 0) { for (let a of as.asteroids) { if (Math.hypot(a.x - as.ship.x, a.y - as.ship.y) < a.size * 3 + 4) { as.lives--; as.invulnerable = 120; sfxDie(); if (as.lives <= 0) { as.gameOver = true; saveHighScore('asteroids', as.score); } else { as.ship = { x: 80, y: 72, angle: 0, vx: 0, vy: 0, thrust: false }; } break; } } }
      as.invulnerable = Math.max(0, as.invulnerable - 1);
      for (let i = as.bullets.length - 1; i >= 0; i--) { let b = as.bullets[i]; for (let j = as.asteroids.length - 1; j >= 0; j--) { let a = as.asteroids[j]; if (Math.hypot(a.x - b.x, a.y - b.y) < a.size * 3) { as.bullets.splice(i, 1); for (let k = 0; k < 8; k++) { as.particles.push({ x: a.x, y: a.y, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4, life: 20 }); } sfxBounce(); as.score += Math.floor(50 / as.size); if (a.size > 1) { for (let k = 0; k < 2; k++) { as.asteroids.push({ x: a.x, y: a.y, vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2, size: a.size - 1, angle: 0, rotSpeed: (Math.random() - 0.5) * 0.1 }); } } as.asteroids.splice(j, 1); break; } } }
      if (as.asteroids.length === 0) { as.level++; for (let i = 0; i < 3 + as.level; i++) { let x, y; do { x = Math.random() * 160; y = Math.random() * 144; } while (Math.hypot(x - 80, y - 72) < 40); as.asteroids.push({ x, y, vx: (Math.random() - 0.5) * (1 + as.level * 0.2), vy: (Math.random() - 0.5) * (1 + as.level * 0.2), size: 3, angle: 0, rotSpeed: (Math.random() - 0.5) * 0.05 }); } sfxPowerUp(); }
    }
    function drawAsteroids() {
      fr(0, 0, 160, 144, '#000011');
      for (let i = 0; i < 30; i++) { const x = (i * 37 + tick * 0.1) % 160; const y = (i * 23) % 144; fr(x, y, 1, 1, tick % 40 < 20 ? '#ffffff' : '#888888'); }
      as.particles.forEach(p => { fr(p.x - 1, p.y - 1, 3, 3, `rgba(255,200,100,${p.life / 20})`); });
      as.asteroids.forEach(a => { ctx.save(); ctx.translate(a.x, a.y); ctx.rotate(a.angle); const s = a.size * 3; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1; ctx.beginPath(); for (let i = 0; i < 8; i++) { const angle = (i / 8) * Math.PI * 2; const r = s + Math.sin(i * 1.7) * s * 0.3; const x = Math.cos(angle) * r; const y = Math.sin(angle) * r; if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); } ctx.closePath(); ctx.stroke(); ctx.restore(); });
      if (!as.gameOver) { ctx.save(); ctx.translate(as.ship.x, as.ship.y); ctx.rotate(as.ship.angle); ctx.strokeStyle = as.invulnerable > 0 && as.invulnerable % 4 < 2 ? '#ff4444' : '#ffffff'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(-6, -4); ctx.lineTo(-4, 0); ctx.lineTo(-6, 4); ctx.closePath(); ctx.stroke(); if (as.ship.thrust) { ctx.strokeStyle = '#ffaa00'; ctx.beginPath(); ctx.moveTo(-4, 0); ctx.lineTo(-8, 0); ctx.stroke(); } ctx.restore(); }
      ctx.fillStyle = '#ffff00'; as.bullets.forEach(b => fr(b.x - 1, b.y - 1, 3, 3));
      fr(0, 0, 160, 11, 'rgba(0,0,50,0.8)'); gt('SCORE', 2, 9, P.w, 5); gt(`${as.score}`, 50, 9, P.w, 5); gt(`LVL ${as.level}`, 100, 9, P.w, 5);
      for (let i = 0; i < as.lives; i++) { ctx.save(); ctx.translate(130 + i * 10, 6); ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(3, 0); ctx.lineTo(-2, -2); ctx.lineTo(-1, 0); ctx.lineTo(-2, 2); ctx.closePath(); ctx.stroke(); ctx.restore(); }
      if (as.gameOver) { fr(20, 45, 120, 62, P.d); fr(20, 45, 120, 1, P.l); fr(20, 107, 120, 1, P.l); fr(20, 45, 1, 62, P.l); fr(140, 45, 1, 62, P.l); gt('GAME OVER', 28, 60, P.l, 7); gt(`SCORE: ${as.score}`, 26, 72, P.m, 5); gt(`BEST: ${getHighScore('asteroids')}`, 26, 80, P.m, 4); gt('A: RETRY', 32, 92, tick % 40 < 24 ? P.w : P.m, 5); gt('B: MENU', 38, 104, P.m, 5); }
      scanlines(); if (paused) drawPauseMenu();
    }

    loop();
  </script>
