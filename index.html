<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Boy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#12121f;background-image:radial-gradient(ellipse at 30% 40%,rgba(30,10,60,.7) 0%,transparent 55%),radial-gradient(ellipse at 75% 70%,rgba(10,30,50,.5) 0%,transparent 50%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-family:'Press Start 2P',monospace;}
  .gameboy{width:420px;background:var(--gb-color,#d0d0dc);border-radius:22px 22px 90px 22px;padding:28px 28px 44px;box-shadow:5px 5px 0 #a0a0b0,10px 10px 0 #707080,0 30px 80px rgba(0,0,0,.8),inset 0 2px 0 rgba(255,255,255,.85),inset -3px -3px 10px rgba(0,0,0,.12);position:relative;transition:background .3s;}
  .screen-bezel{background:#1e1e2e;border-radius:12px 12px 6px 6px;padding:16px 16px 22px;box-shadow:inset 0 4px 12px rgba(0,0,0,.7),inset 0 0 0 3px #14141e;margin-bottom:20px;position:relative;}
  .screen-bezel::after{content:'● ●';position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:7px;color:#44445a;letter-spacing:6px;}
  .screen-label{text-align:center;font-size:7px;color:#55556a;letter-spacing:3px;margin-bottom:10px;}
  #gameCanvas{display:block;width:340px;height:306px;image-rendering:pixelated;image-rendering:crisp-edges;margin:0 auto;border:3px solid #0a0a12;}
  .controls{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
  .dpad{width:90px;height:90px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:2px;}
  .dpad-btn{background:#4a4a5a;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#6a6a7a;user-select:none;box-shadow:0 3px 0 #2a2a3a;transition:transform .05s,box-shadow .05s;}
  .dpad-btn:active,.dpad-btn.pressed{transform:translateY(2px);box-shadow:0 1px 0 #2a2a3a;background:#3a3a4a;}
  .dpad-center{background:#3a3a4a;cursor:default;}.dpad-empty{background:transparent;box-shadow:none;cursor:default;}
  .ab-buttons{display:flex;gap:10px;align-items:flex-end;margin-bottom:6px;}
  .btn-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,.92);cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.45);user-select:none;transition:transform .05s,box-shadow .05s;}
  .btn-circle:active,.btn-circle.pressed{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.45);filter:brightness(1.3);}
  .btn-a{background:#cc2244;}.btn-b{background:#882266;}
  .start-select{display:flex;gap:12px;justify-content:center;margin-top:14px;}
  .btn-small{background:#888898;border-radius:10px;width:44px;height:12px;display:flex;align-items:center;justify-content:center;font-size:5px;color:#3a3a4a;cursor:pointer;box-shadow:0 3px 0 #5a5a6a;letter-spacing:1px;user-select:none;}
  .btn-small:active,.btn-small.pressed{transform:translateY(2px);box-shadow:0 1px 0 #5a5a6a;filter:brightness(1.2);}
  .speaker{display:flex;flex-direction:column;gap:5px;margin-top:6px;align-self:flex-end;margin-bottom:8px;}
  .speaker-row{display:flex;gap:5px;}
  .speaker-dot{width:5px;height:5px;border-radius:50%;background:#b0b0c0;box-shadow:inset 0 1px 0 rgba(0,0,0,.3);}
  .color-picker{display:flex;gap:8px;align-items:center;justify-content:center;}
  .color-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid rgba(0,0,0,0.3);transition:transform .15s,border .15s;}
  .color-swatch:hover{transform:scale(1.2);}
  .color-swatch.active{border:3px solid #fff;transform:scale(1.15);}
  .color-label{font-family:'Press Start 2P',monospace;font-size:5px;color:#555;letter-spacing:1px;}
  /* Power button */
  .power-btn{width:14px;height:14px;border-radius:50%;background:#cc2244;border:2px solid #881122;cursor:pointer;position:absolute;right:20px;top:14px;box-shadow:0 2px 0 #660011;transition:transform .1s;}
  .power-btn:active{transform:scale(0.9);}
</style>
</head>
<body>
<div class="gameboy" id="gameboy">
  <div class="power-btn" id="powerBtn" title="Power Off/On"></div>
  <div class="screen-bezel">
    <div class="screen-label">Nintendo</div>
    <canvas id="gameCanvas" width="160" height="144"></canvas>
  </div>
  <div class="start-select">
    <div class="btn-small" id="btn-select">SELECT</div>
    <div class="btn-small" id="btn-start">START</div>
  </div>
  <div class="controls">
    <div class="dpad">
      <div class="dpad-empty"></div><div class="dpad-btn" id="btn-up">▲</div><div class="dpad-empty"></div>
      <div class="dpad-btn" id="btn-left">◀</div><div class="dpad-btn dpad-center"></div><div class="dpad-btn" id="btn-right">▶</div>
      <div class="dpad-empty"></div><div class="dpad-btn" id="btn-down">▼</div><div class="dpad-empty"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div class="ab-buttons">
        <div class="btn-circle btn-b" id="btn-b">B</div>
        <div class="btn-circle btn-a" id="btn-a">A</div>
      </div>
      <div style="font-size:6px;color:#888898;letter-spacing:2px">B &nbsp;&nbsp; A</div>
    </div>
  </div>
  <div style="display:flex;justify-content:flex-end;margin-top:6px">
    <div class="speaker">
      <div class="speaker-row"><div class="speaker-dot"></div><div class="speaker-dot"></div><div class="speaker-dot"></div><div class="speaker-dot"></div><div class="speaker-dot"></div></div>
      <div class="speaker-row"><div class="speaker-dot"></div><div class="speaker-dot"></div><div class="speaker-dot"></div><div class="speaker-dot"></div><div class="speaker-dot"></div></div>
      <div class="speaker-row"><div class="speaker-dot"></div><div class="speaker-dot"></div><div class="speaker-dot"></div><div class="speaker-dot"></div><div class="speaker-dot"></div></div>
      <div class="speaker-row"><div class="speaker-dot"></div><div class="speaker-dot"></div><div class="speaker-dot"></div><div class="speaker-dot"></div><div class="speaker-dot"></div></div>
    </div>
  </div>
</div>
<div class="color-picker">
  <span class="color-label">COLOR:</span>
  <div class="color-swatch active" style="background:#d0d0dc;" onclick="setGBColor('#d0d0dc','#a0a0b0',this)" title="Classic Grey"></div>
  <div class="color-swatch" style="background:#e8c8f0;" onclick="setGBColor('#e8c8f0','#c090d0',this)" title="Purple"></div>
  <div class="color-swatch" style="background:#c8e0f8;" onclick="setGBColor('#c8e0f8','#90b8e0',this)" title="Blue"></div>
  <div class="color-swatch" style="background:#c8f0d0;" onclick="setGBColor('#c8f0d0','#90d0a0',this)" title="Green"></div>
  <div class="color-swatch" style="background:#f8d0c8;" onclick="setGBColor('#f8d0c8','#e0a090',this)" title="Red"></div>
  <div class="color-swatch" style="background:#f8f0c0;" onclick="setGBColor('#f8f0c0','#e0d080',this)" title="Yellow"></div>
  <div class="color-swatch" style="background:#1a1a1a;border-color:#555;" onclick="setGBColor('#1a1a1a','#000',this)" title="Black"></div>
</div>
<script>
// ═══ CORE ═══
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
const P={w:'#e8f8d0',l:'#a0c858',m:'#386828',d:'#082000'};

function setGBColor(bg,shadow,el){
  document.getElementById('gameboy').style.setProperty('--gb-color',bg);
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('gameboy').style.boxShadow=`5px 5px 0 ${shadow},10px 10px 0 #707080,0 30px 80px rgba(0,0,0,.8),inset 0 2px 0 rgba(255,255,255,.85),inset -3px -3px 10px rgba(0,0,0,.12)`;
}

// ── Power on/off ──
let powered=true,powerAnim=0,poweringOff=false,poweringOn=false;
document.getElementById('powerBtn').addEventListener('click',()=>{
  if(powered&&!poweringOff){poweringOff=true;powerAnim=0;}
  else if(!powered&&!poweringOn){poweringOn=true;powerAnim=0;}
});

// INPUT
const keys={},jp={};
// Key → button id mapping for visual feedback
const keyToBtnId={'ArrowUp':'btn-up','ArrowDown':'btn-down','ArrowLeft':'btn-left','ArrowRight':'btn-right','a':'btn-a','b':'btn-b','Enter':'btn-start','Shift':'btn-select'};
document.addEventListener('keydown',e=>{
  if(!keys[e.key])jp[e.key]=true;
  keys[e.key]=true;
  // visually press the gameboy button
  const btnId=keyToBtnId[e.key];
  if(btnId){const el=document.getElementById(btnId);if(el)el.classList.add('pressed');}
  e.preventDefault();
});
document.addEventListener('keyup',e=>{
  keys[e.key]=false;
  const btnId=keyToBtnId[e.key];
  if(btnId){const el=document.getElementById(btnId);if(el)el.classList.remove('pressed');}
});
function pop(k){const v=jp[k];jp[k]=false;return v;}
const btnMap={'btn-up':'ArrowUp','btn-down':'ArrowDown','btn-left':'ArrowLeft','btn-right':'ArrowRight','btn-a':'a','btn-b':'b','btn-start':'Enter','btn-select':'Shift'};
Object.entries(btnMap).forEach(([id,key])=>{
  const el=document.getElementById(id);if(!el)return;
  const dn=()=>{if(!keys[key])jp[key]=true;keys[key]=true;el.classList.add('pressed');};
  const up=()=>{keys[key]=false;el.classList.remove('pressed');};
  el.addEventListener('mousedown',dn);el.addEventListener('mouseup',up);el.addEventListener('mouseleave',up);
  el.addEventListener('touchstart',e=>{e.preventDefault();dn();},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();up();});
});

function fr(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}
function gt(s,x,y,c,sz){ctx.save();ctx.fillStyle=c||P.d;ctx.font=`${sz||6}px 'Press Start 2P',monospace`;ctx.fillText(s,x,y);ctx.restore();}
function ct(s,y,c,sz){ctx.save();ctx.fillStyle=c||P.d;ctx.font=`${sz||6}px 'Press Start 2P',monospace`;const w=ctx.measureText(s).width;ctx.fillText(s,Math.floor((160-w)/2),y);ctx.restore();}
function scanlines(){for(let y=0;y<144;y+=2){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,y,160,1);}}
function hpBar(x,y,w,cur,max){fr(x,y,w,4,P.d);const p=Math.max(0,cur/max);fr(x+1,y+1,Math.floor((w-2)*p),2,p>.5?P.m:p>.25?'#d0c000':'#c02020');}
function cfm(){return pop('a')||pop('Enter');}
let screen='poweron',tick=0,paused=false;

// ── PAUSE OVERLAY ──
function drawPauseMenu(){
  ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,160,144);
  fr(22,42,116,68,P.d);fr(22,42,116,1,P.l);fr(22,110,116,1,P.l);fr(22,42,1,68,P.l);fr(138,42,1,68,P.l);
  ct('PAUSED',56,P.l,8);ct('A: RESUME',74,tick%40<24?P.w:P.m,5);ct('B: QUIT TO MENU',86,P.m,5);
}

// ═══ POWER ON ANIMATION ═══
let bootPhase=0,bootTimer=0;
function drawPowerOn(){
  powerAnim++;
  if(powerAnim<15){
    // Screen flash white
    const alpha=powerAnim/15;
    fr(0,0,160,144,`rgba(255,255,255,${alpha})`);
  } else if(powerAnim<40){
    // Flash fades to black
    const alpha=1-(powerAnim-15)/25;
    fr(0,0,160,144,'#000');
    if(alpha>0){fr(0,0,160,144,`rgba(255,255,255,${alpha})`);}
  } else if(powerAnim<50){
    fr(0,0,160,144,P.d);
  } else {
    // Transition to boot
    poweringOn=false;powered=true;
    screen='boot';bootPhase=0;bootTimer=0;
  }
}

function drawPowerOff(){
  powerAnim++;
  if(powerAnim<20){
    // Screen shrinks to horizontal line
    const h=Math.max(1,Math.floor(144*(1-powerAnim/20)));
    const y=Math.floor((144-h)/2);
    fr(0,0,160,144,P.d);
    fr(0,y,160,h,P.w);
  } else if(powerAnim<35){
    // Line fades out
    const alpha=1-(powerAnim-20)/15;
    fr(0,0,160,144,P.d);
    fr(0,71,160,2,`rgba(200,240,200,${alpha})`);
  } else {
    poweringOff=false;powered=false;
    fr(0,0,160,144,P.d);
  }
}

// ═══ BOOT SCREEN - animated ═══
function updateBoot(){
  bootTimer++;
  if(bootPhase===0&&bootTimer>20){bootPhase=1;bootTimer=0;}
  if(bootPhase===1&&bootTimer>25){bootPhase=2;bootTimer=0;}
  if(bootPhase===2&&bootTimer>30){bootPhase=3;bootTimer=0;}
  if(bootPhase===3&&bootTimer>20&&cfm())screen='launcher';
}
function drawBoot(){
  fr(0,0,160,144,P.d);
  if(bootPhase===0){
    // Black screen
    return;
  }
  if(bootPhase>=1){
    // Nintendo logo slides down from top
    const progress=Math.min(1,bootTimer/20);
    const logoY=bootPhase===1?Math.floor(-12+52*progress):52;
    ct('Nintendo',logoY,P.l,10);
  }
  if(bootPhase>=2){
    // GAME BOY fades in
    const alpha=Math.min(1,bootTimer/20);
    ctx.save();ctx.globalAlpha=alpha;
    ct('GAME  BOY',88,P.w,9);
    ctx.restore();
  }
  if(bootPhase>=3){
    const b=tick%40<24;
    ct('PRESS  START',110,b?P.l:P.m,6);
    ct('TO  PLAY',122,b?P.l:P.m,6);
  }
}

// ═══ LAUNCHER — 3x3 grid for 9 games ═══
const CARTS=[
  {id:'pokemon', label:'POKEMON',  sub:'RPG',     color:'#d02020',color2:'#901010'},
  {id:'tetris',  label:'TETRIS',   sub:'PUZZLE',  color:'#1a8cff',color2:'#0050b0'},
  {id:'mario',   label:'MARIO',    sub:'PLATFORM',color:'#e03010',color2:'#901000'},
  {id:'snake',   label:'SNAKE',    sub:'CLASSIC', color:'#20a020',color2:'#105010'},
  {id:'flappy',  label:'FLAPPY',   sub:'ARCADE',  color:'#e0a000',color2:'#806000'},
  {id:'space',   label:'INVADERS', sub:'SHOOT',   color:'#8020c0',color2:'#401060'},
  {id:'breakout',label:'BREAKOUT', sub:'ACTION',  color:'#e06000',color2:'#804000'},
  {id:'pacman',  label:'PAC-MAN',  sub:'MAZE',    color:'#f8d800',color2:'#907000'},
  {id:'pong',    label:'PONG',     sub:'SPORTS',  color:'#ffffff',color2:'#888888'},
];
let launchSel=0;
function updateLauncher(){
  const n=CARTS.length;
  if(pop('ArrowLeft'))launchSel=(launchSel-1+n)%n;
  if(pop('ArrowRight'))launchSel=(launchSel+1)%n;
  if(pop('ArrowUp'))launchSel=(launchSel-3+n)%n;
  if(pop('ArrowDown'))launchSel=(launchSel+3)%n;
  if(cfm()){
    paused=false;
    const id=CARTS[launchSel].id;
    if(id==='pokemon'){initPokemon();screen='pokemon';}
    else if(id==='tetris'){initTetris();screen='tetris';}
    else if(id==='mario'){initMario();screen='mario';}
    else if(id==='snake'){initSnake();screen='snake';}
    else if(id==='flappy'){initFlappy();screen='flappy';}
    else if(id==='space'){initSpace();screen='space';}
    else if(id==='breakout'){initBreakout();screen='breakout';}
    else if(id==='pacman'){initPacman();screen='pacman';}
    else if(id==='pong'){initPong();screen='pong';}
  }
}
function drawLauncher(){
  fr(0,0,160,144,P.d);fr(0,0,160,80,'#0a1a30');
  [[12,8],[45,14],[80,5],[120,18],[150,9],[30,28],[100,22],[140,30],[60,35],[140,55],[20,60],[90,50]].forEach(([x,y])=>fr(x,y,1,1,tick%60<30?P.l:P.m));
  fr(0,0,160,15,P.m);fr(0,15,160,1,P.l);ct('GAME  BOY',11,P.w,7);
  // 3x3 grid
  CARTS.forEach((g,i)=>{
    const row=Math.floor(i/3),col=i%3;
    const cx=3+col*52,cy=17+row*42,sel=launchSel===i;
    fr(cx,cy,48,38,sel?P.m:P.d);
    fr(cx,cy,48,1,sel?P.l:P.m);fr(cx,cy+37,48,1,sel?P.l:P.m);
    fr(cx,cy,1,38,sel?P.l:P.m);fr(cx+47,cy,1,38,sel?P.l:P.m);
    fr(cx+2,cy+2,44,14,g.color2);fr(cx+2,cy+2,44,12,g.color);
    ctx.save();ctx.fillStyle=P.w;ctx.font=`4px 'Press Start 2P',monospace`;
    const tw=ctx.measureText(g.label).width;
    ctx.fillText(g.label,cx+2+Math.floor((44-tw)/2),cy+10);ctx.restore();
    gt(g.sub,cx+4,cy+14,'#aaa',3);
    fr(cx+10,cy+18,28,4,sel?P.l:'#1a2a1a');// cart slot
    if(sel){ctx.strokeStyle=P.l;ctx.lineWidth=1;ctx.strokeRect(cx,cy,48,38);}
  });
  fr(0,143,160,1,P.m);
  const g=CARTS[launchSel];
  gt(g.label+': '+g.sub,4,142,P.w,4);
  scanlines();
}

// ═══ POKEMON ═══
const POKE_GAMES=[
  {title:'RED',year:'1996',gen:'GEN I',color:'#d02020'},{title:'BLUE',year:'1996',gen:'GEN I',color:'#2040c0'},
  {title:'YELLOW',year:'1998',gen:'GEN I',color:'#d0a000'},{title:'GOLD',year:'1999',gen:'GEN II',color:'#c08000'},
  {title:'SILVER',year:'1999',gen:'GEN II',color:'#8090b0'},{title:'CRYSTAL',year:'2000',gen:'GEN II',color:'#4090c0'},
  {title:'RUBY',year:'2002',gen:'GEN III',color:'#b01030'},{title:'SAPPHIRE',year:'2002',gen:'GEN III',color:'#1050b0'},
  {title:'EMERALD',year:'2004',gen:'GEN III',color:'#208040'},{title:'FIRERED',year:'2004',gen:'GEN III',color:'#e04010'},
  {title:'LEAFGREEN',year:'2004',gen:'GEN III',color:'#308030'},{title:'DIAMOND',year:'2006',gen:'GEN IV',color:'#6080d0'},
  {title:'PEARL',year:'2006',gen:'GEN IV',color:'#d060a0'},{title:'PLATINUM',year:'2008',gen:'GEN IV',color:'#808090'},
  {title:'HGSS',year:'2009',gen:'GEN IV',color:'#c09020'},{title:'BLACK',year:'2010',gen:'GEN V',color:'#202020'},
  {title:'WHITE',year:'2010',gen:'GEN V',color:'#d0d0d0'},{title:'B2W2',year:'2012',gen:'GEN V',color:'#304080'},
  {title:'X',year:'2013',gen:'GEN VI',color:'#2060c0'},{title:'Y',year:'2013',gen:'GEN VI',color:'#c03060'},
  {title:'ORAS',year:'2014',gen:'GEN VI',color:'#b03020'},{title:'SUN',year:'2016',gen:'GEN VII',color:'#e08010'},
  {title:'MOON',year:'2016',gen:'GEN VII',color:'#303080'},{title:'USUM',year:'2017',gen:'GEN VII',color:'#b06010'},
  {title:'LGPE',year:'2018',gen:'GEN VII',color:'#e04090'},{title:'SWORD',year:'2019',gen:'GEN VIII',color:'#2050b0'},
  {title:'SHIELD',year:'2019',gen:'GEN VIII',color:'#c02020'},{title:'BDSP',year:'2021',gen:'GEN VIII',color:'#5070c0'},
  {title:'LEGENDS',year:'2022',gen:'GEN VIII',color:'#505080'},{title:'SCARLET',year:'2022',gen:'GEN IX',color:'#d02010'},
  {title:'VIOLET',year:'2022',gen:'GEN IX',color:'#6020c0'},
];
const PVS=6;let pgSel=0,pgScroll=0;
const PMAP=[[2,2,2,2,2,2,2,2,2,2],[2,3,3,3,1,1,0,5,2,2],[2,3,0,0,1,1,0,0,0,2],[2,3,0,1,1,5,0,0,0,2],[2,3,3,3,3,3,3,3,3,2],[2,0,5,1,1,0,0,0,3,2],[2,0,1,1,0,0,5,4,3,2],[2,2,0,0,0,0,3,3,3,2],[2,2,2,2,2,2,2,2,2,2]];
const WILD=[
  {name:'BULBASAUR',hp:45,atk:49,def:49,col:'#40a040',mv:[{n:'TACKLE',p:40},{n:'VINE WHIP',p:45},{n:'GROWL',p:0},{n:'LEECH SEED',p:20}]},
  {name:'CHARMANDER',hp:39,atk:52,def:43,col:'#e06020',mv:[{n:'SCRATCH',p:40},{n:'EMBER',p:40},{n:'GROWL',p:0},{n:'TACKLE',p:35}]},
  {name:'SQUIRTLE',hp:44,atk:48,def:65,col:'#4080c0',mv:[{n:'TACKLE',p:40},{n:'WATER GUN',p:40},{n:'TAIL WHIP',p:0},{n:'BUBBLE',p:20}]},
  {name:'PIDGEY',hp:40,atk:45,def:40,col:'#c0a060',mv:[{n:'TACKLE',p:35},{n:'GUST',p:40},{n:'SAND ATK',p:0},{n:'QUICK ATK',p:40}]},
  {name:'RATTATA',hp:30,atk:56,def:35,col:'#a060a0',mv:[{n:'TACKLE',p:35},{n:'QUICK ATK',p:40},{n:'TAIL WHIP',p:0},{n:'BITE',p:60}]},
  {name:'GEODUDE',hp:40,atk:80,def:100,col:'#a09060',mv:[{n:'TACKLE',p:35},{n:'ROCK THROW',p:50},{n:'DEF CURL',p:0},{n:'MAGNITUDE',p:70}]},

let pm={};
function initPacman(){

    pMoveAcc:0,pMoveSpeed:0.15,

}
function pmCanMove(tx,ty){return tx>=0&&tx<PM_W&&ty>=0&&ty<PM_H&&PM_MAZE_SRC[ty][tx]!==1;}
function updatePacman(){
  if(pop('Enter')){paused=!paused;return;}
  if(paused){if(cfm())paused=false;else if(pop('b')){paused=false;screen='launcher';}return;}
  if(pm.over||pm.win){if(cfm())initPacman();else if(pop('b'))screen='launcher';return;}
  // Direct movement: hold a key = move that way
  let wantX=0,wantY=0;
  if(keys['ArrowUp']){wantX=0;wantY=-1;}
  else if(keys['ArrowDown']){wantX=0;wantY=1;}
  else if(keys['ArrowLeft']){wantX=-1;wantY=0;}
  else if(keys['ArrowRight']){wantX=1;wantY=0;}
  
  pm.mouth+=pm.mouthDir*0.16;
  if(pm.mouth>=0.42||pm.mouth<=0)pm.mouthDir*=-1;
  
  // Tile-based movement
  const snapX=Math.round(pm.px),snapY=Math.round(pm.py);
  const atCenter=Math.abs(pm.px-snapX)<0.08&&Math.abs(pm.py-snapY)<0.08;
  
  if(atCenter){
    pm.px=snapX;pm.py=snapY;
    // Try desired direction
    if((wantX!==0||wantY!==0)&&pmCanMove(snapX+wantX,snapY+wantY)){
      pm.pdir={x:wantX,y:wantY};
    }
    // Move if direction is valid
    if(pmCanMove(snapX+pm.pdir.x,snapY+pm.pdir.y)){
      pm.px+=pm.pdir.x*pm.pMoveSpeed;
      pm.py+=pm.pdir.y*pm.pMoveSpeed;
    } else {
      pm.pdir={x:0,y:0};
    }
  } else {
    // Between tiles: keep moving
    pm.px+=pm.pdir.x*pm.pMoveSpeed;
    pm.py+=pm.pdir.y*pm.pMoveSpeed;
  }
  if(pm.px<0)pm.px=PM_W-1;if(pm.px>=PM_W)pm.px=0;
  const curTx=Math.round(pm.px),curTy=Math.round(pm.py);
  if(curTx>=0&&curTx<PM_W&&curTy>=0&&curTy<PM_H){
    if(pm.maze[curTy][curTx]===2){pm.maze[curTy][curTx]=0;pm.score+=10;pm.dots--;}
    else if(pm.maze[curTy][curTx]===3){pm.maze[curTy][curTx]=0;pm.score+=50;pm.dots--;pm.power=180;pm.ghosts.forEach(g=>{if(!g.eaten)g.scared=true;});}
    if(pm.dots<=0)pm.win=true;
  }
  if(pm.power>0){pm.power--;if(pm.power===0)pm.ghosts.forEach(g=>{g.scared=false;});}
  pm.ghosts.forEach(g=>{
    if(g.eaten){
      g.moveTimer++;if(g.moveTimer>=8){
        g.moveTimer=0;
        const htx=9,hty=9;
        if(Math.abs(g.tx-htx)<=1&&Math.abs(g.ty-hty)<=1){g.eaten=false;g.scared=false;}
        else{
          const dirs=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
          const best=dirs.filter(d=>pmCanMove(g.tx+d.x,g.ty+d.y)).sort((a,b)=>(Math.abs(g.tx+a.x-htx)+Math.abs(g.ty+a.y-hty))-(Math.abs(g.tx+b.x-htx)+Math.abs(g.ty+b.y-hty)))[0];
          if(best){g.tx+=best.x;g.ty+=best.y;g.dx=best.x;g.dy=best.y;}
        }
      }
    } else {
      g.moveTimer++;
      const spd=g.scared?g.speed*2:g.speed;
      if(g.moveTimer>=spd){
        g.moveTimer=0;
        const dirs=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
        const valid=dirs.filter(d=>pmCanMove(g.tx+d.x,g.ty+d.y)&&!(d.x===-g.dx&&d.y===-g.dy));
        const pool=valid.length>0?valid:dirs.filter(d=>pmCanMove(g.tx+d.x,g.ty+d.y));
        if(pool.length){
          let gTx=Math.round(pm.px),gTy=Math.round(pm.py);
          if(g.tx>=8&&g.tx<=11&&g.ty>=8&&g.ty<=10){gTx=9;gTy=7;}
          let chosen;
          if(g.scared||Math.random()<0.15){chosen=pool[Math.floor(Math.random()*pool.length)];}
          else{chosen=pool.sort((a,b)=>(Math.abs(g.tx+a.x-gTx)+Math.abs(g.ty+a.y-gTy))-(Math.abs(g.tx+b.x-gTx)+Math.abs(g.ty+b.y-gTy)))[0];}
          g.tx+=chosen.x;g.ty+=chosen.y;g.dx=chosen.x;g.dy=chosen.y;
        }
      }
    }
    // Collision - check every frame, moving or not
    if(Math.abs(g.tx-Math.round(pm.px))===0&&Math.abs(g.ty-Math.round(pm.py))===0){
      if(g.scared&&!g.eaten){g.eaten=true;g.scared=false;pm.score+=200;pm.eatScore=200;pm.eatTimer=50;}
      else if(!g.eaten&&!pm.over){pm.lives--;if(pm.lives<=0)pm.over=true;else{pm.px=9;pm.py=16;pm.pdir={x:0,y:0};}}
    }
  });
}
function drawGhost(gx,gy,color,scared,eaten,flash){
  const S=PM_SZ;
  if(eaten){fr(gx+1,gy+2,2,2,'#ffffff');fr(gx+4,gy+2,2,2,'#ffffff');fr(gx+2,gy+3,1,2,'#0000ff');fr(gx+5,gy+3,1,2,'#0000ff');return;}
  const c=scared?(flash?'#ffffff':'#2020e0'):color;
  // Rounded dome body - NO MOUTH
  fr(gx+2,gy,  4,1,c);
  fr(gx+1,gy+1,6,1,c);
  fr(gx,  gy+2,8,4,c);
  // Flat bottom with 3 wavy bumps
  fr(gx,  gy+6,2,2,c);// left bump
  fr(gx+3,gy+6,2,2,c);// mid bump
  fr(gx+6,gy+6,2,2,c);// right bump
  fr(gx+2,gy+6,1,1,c);// fill gap
  fr(gx+5,gy+6,1,1,c);// fill gap
  if(!scared){
    // White eyes (classic ghost look)
    fr(gx+1,gy+2,3,3,'#ffffff');
    fr(gx+4,gy+2,3,3,'#ffffff');
    // Dark pupils
    fr(gx+2,gy+3,1,2,'#000080');
    fr(gx+5,gy+3,1,2,'#000080');
  } else {
    // Scared: small white eyes only, NO mouth
    fr(gx+2,gy+3,1,1,'#ffffff');
    fr(gx+5,gy+3,1,1,'#ffffff');
  }
}
function drawPacman(){
  fr(0,0,160,144,'#000000');
  const S=PM_SZ,OX=0,OY=8;
  for(let y=0;y<PM_H;y++){for(let x=0;x<PM_W;x++){
    if(PM_MAZE_SRC[y][x]===1){
      fr(OX+x*S,OY+y*S,S,S,'#0000aa');
      const u=y>0&&PM_MAZE_SRC[y-1][x]!==1,d=y<PM_H-1&&PM_MAZE_SRC[y+1][x]!==1;
      const l=x>0&&PM_MAZE_SRC[y][x-1]!==1,r=x<PM_W-1&&PM_MAZE_SRC[y][x+1]!==1;
      if(u)fr(OX+x*S,OY+y*S,S,1,'#5555ff');
      if(d)fr(OX+x*S,OY+y*S+S-1,S,1,'#5555ff');
      if(l)fr(OX+x*S,OY+y*S,1,S,'#5555ff');
      if(r)fr(OX+x*S+S-1,OY+y*S,1,S,'#5555ff');
    } else if(pm.maze[y][x]===2){
      fr(OX+x*S+3,OY+y*S+3,2,2,'#ffff99');
    } else if(pm.maze[y][x]===3){
      if(tick%30<20)fr(OX+x*S+2,OY+y*S+2,4,4,'#ffffff');
    }
  }}
  const flash=pm.power<60&&tick%16<8;
  pm.ghosts.forEach(g=>{drawGhost(OX+g.tx*S,OY+g.ty*S,g.color,g.scared,g.eaten,flash);});
  const psx=OX+pm.px*S+S/2,psy=OY+pm.py*S+S/2;
  ctx.save();ctx.fillStyle='#f8d800';ctx.beginPath();
  const mAngle=pm.pdir.x===0&&pm.pdir.y===0?0.1:pm.mouth*Math.PI;
  const faceDir=pm.pdir.x!==0?pm.pdir.x>0?0:Math.PI:pm.pdir.y>0?Math.PI/2:-Math.PI/2;
  ctx.moveTo(psx,psy);ctx.arc(psx,psy,S/2-1,faceDir+mAngle,faceDir+2*Math.PI-mAngle);ctx.closePath();ctx.fill();ctx.restore();
  if(pm.eatTimer>0){pm.eatTimer--;gt(`+${pm.eatScore}`,Math.floor(psx)-8,Math.floor(psy)-6,'#ffffff',5);}
  if(pm.power>0)fr(0,140,Math.floor(160*(pm.power/180)),3,flash?'#ffffff':'#0080ff');
  fr(0,0,160,8,'rgba(0,0,0,0.9)');gt(`${pm.score}`,2,7,P.w,5);
  for(let i=0;i<pm.lives;i++){ctx.save();ctx.fillStyle='#f8d800';ctx.beginPath();ctx.moveTo(132+i*12,4);ctx.arc(132+i*12,4,4,0.4,Math.PI*2-0.4);ctx.closePath();ctx.fill();ctx.restore();}
  if(pm.over){fr(18,46,124,60,'#000000');fr(18,46,124,1,'#f8d800');fr(18,106,124,1,'#f8d800');fr(18,46,1,60,'#f8d800');fr(142,46,1,60,'#f8d800');gt('GAME OVER',26,61,P.l,7);gt(`SCORE:${pm.score}`,26,76,P.w,5);gt('A: RETRY',30,90,tick%40<24?P.w:P.m,5);gt('B: MENU',36,102,P.m,5);}
  if(pm.win){fr(18,46,124,60,'#000000');fr(18,46,124,1,'#f8d800');fr(18,106,124,1,'#f8d800');fr(18,46,1,60,'#f8d800');fr(142,46,1,60,'#f8d800');gt('YOU WIN!',30,61,'#f8d800',8);gt(`SCORE:${pm.score}`,26,76,P.w,5);gt('A: RETRY',30,90,tick%40<24?P.w:P.m,5);gt('B: MENU',36,102,P.m,5);}
  scanlines();if(paused)drawPauseMenu();
}

// ═══ PONG ═══
let pg={};
function initPong(){pg={p1y:62,p2y:62,ball:{x:80,y:72,dx:2,dy:1.2},p1s:0,p2s:0,over:false,winner:0,serving:true};}
function updatePong(){
  if(pop('Enter')){paused=!paused;return;}
  if(paused){if(cfm())paused=false;else if(pop('b')){paused=false;screen='launcher';}return;}
  if(pg.over){if(cfm())initPong();else if(pop('b'))screen='launcher';return;}
  if(pg.serving){if(cfm()||pop(' ')){pg.serving=false;}return;}
  // player1 controls (arrows/WS)
  if(keys['ArrowUp']||keys['w'])pg.p1y=Math.max(0,pg.p1y-2.5);
  if(keys['ArrowDown']||keys['s'])pg.p1y=Math.min(124,pg.p1y+2.5);
  // AI player2 - predict where ball will be and move smoothly
  let aiTarget=pg.ball.y-10;
  if(pg.ball.dx>0){
    const framesUntilArrival=Math.max(1,(148-pg.ball.x)/Math.abs(pg.ball.dx));
    aiTarget=pg.ball.y+pg.ball.dy*framesUntilArrival*0.6-10;
  }
  aiTarget=Math.max(0,Math.min(124,aiTarget));
  // Move at a fixed max speed instead of lerp for smooth motion
  const aiDiff=aiTarget-pg.p2y;
  const aiMaxSpeed=1.8;
  if(Math.abs(aiDiff)>1){
    pg.p2y+=Math.sign(aiDiff)*Math.min(aiMaxSpeed,Math.abs(aiDiff));
  }
  pg.p2y=Math.max(0,Math.min(124,pg.p2y));
  pg.ball.x+=pg.ball.dx;pg.ball.y+=pg.ball.dy;
  if(pg.ball.y<=5||pg.ball.y>=138){pg.ball.dy*=-1;}
  // p1 paddle (left)
  if(pg.ball.x<=10&&pg.ball.y>=pg.p1y&&pg.ball.y<=pg.p1y+20){
    pg.ball.dx=Math.min(4,Math.abs(pg.ball.dx)+0.1);
    pg.ball.dy=3*((pg.ball.y-pg.p1y)/20-0.5);
    pg.ball.x=11;
  }
  // p2 paddle (right)
  if(pg.ball.x>=148&&pg.ball.y>=pg.p2y&&pg.ball.y<=pg.p2y+20){
    pg.ball.dx=-Math.min(4,Math.abs(pg.ball.dx)+0.1);
    pg.ball.dy=3*((pg.ball.y-pg.p2y)/20-0.5);
    pg.ball.x=147;
  }
  // score
  if(pg.ball.x<0){pg.p2s++;pg.ball={x:80,y:72,dx:2,dy:1.2*(Math.random()>0.5?1:-1)};pg.serving=true;}
  if(pg.ball.x>160){pg.p1s++;pg.ball={x:80,y:72,dx:-2,dy:1.2*(Math.random()>0.5?1:-1)};pg.serving=true;}
  if(pg.p1s>=7||pg.p2s>=7){pg.over=true;pg.winner=pg.p1s>=7?1:2;}
}
function drawPong(){
  fr(0,0,160,144,'#000000');
  // center line dashes
  for(let y=0;y<144;y+=12)fr(79,y,2,8,'#333');
  // scores
  ct(`${pg.p1s}   ${pg.p2s}`,14,P.w,10);
  // paddles
  fr(4,Math.floor(pg.p1y),4,20,'#ffffff');fr(152,Math.floor(pg.p2y),4,20,'#ffffff');
  // ball
  fr(Math.floor(pg.ball.x)-2,Math.floor(pg.ball.y)-2,4,4,'#ffffff');
  if(pg.serving){ct('A: SERVE',80,'#888',5);}
  gt('YOU',8,10,'#888',4);gt('CPU',132,10,'#888',4);
  if(pg.over){fr(28,52,104,50,P.d);fr(28,52,104,1,P.w);fr(28,102,104,1,P.w);fr(28,52,1,50,P.w);fr(132,52,1,50,P.w);gt(pg.winner===1?'YOU WIN!':'CPU WINS',32,67,pg.winner===1?P.l:'#f04040',7);gt('A: RETRY',36,82,tick%40<24?P.w:P.m,5);gt('B: MENU',40,94,P.m,5);}
  scanlines();if(paused)drawPauseMenu();
}

// ═══ MAIN LOOP ═══
function update(){
  tick++;
  if(poweringOff){return;}
  if(poweringOn){return;}
  if(!powered){return;}
  if(screen==='poweron')return;
  if(screen==='boot')updateBoot();
  else if(screen==='launcher')updateLauncher();
  else if(screen==='pokemon')updatePokemon();
  else if(screen==='tetris')updateTetris();
  else if(screen==='mario')updateMario();
  else if(screen==='snake')updateSnake();
  else if(screen==='flappy')updateFlappy();
  else if(screen==='space')updateSpace();
  else if(screen==='breakout')updateBreakout();
  else if(screen==='pacman')updatePacman();
  else if(screen==='pong')updatePong();
}

function loop(){
  ctx.clearRect(0,0,160,144);
  if(poweringOff){drawPowerOff();}
  else if(poweringOn){drawPowerOn();}
  else if(!powered){fr(0,0,160,144,P.d);}
  else{
    if(screen==='boot')drawBoot();
    else if(screen==='launcher')drawLauncher();
    else if(screen==='pokemon')drawPokemon();
    else if(screen==='tetris')drawTetris();
    else if(screen==='mario')drawMario();
    else if(screen==='snake')drawSnake();
    else if(screen==='flappy')drawFlappy();
    else if(screen==='space')drawSpace();
    else if(screen==='breakout')drawBreakout();
    else if(screen==='pacman')drawPacman();
    else if(screen==='pong')drawPong();
  }
  update();
  for(const k in jp)jp[k]=false;
  requestAnimationFrame(loop);
}

// Start with power-on animation
poweringOn=true;powered=false;
loop();
</script>
